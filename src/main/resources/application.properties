spring.application.name=recommendation-service
server.port=8080


application.recommendations-db.url=jdbc:h2:file:./transaction


spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.dynamic-db.url=jdbc:h2:mem:dynamic_db;DB_CLOSE_DELAY=-1
app.dynamic-db.username=sa
app.dynamic-db.password=
app.dynamic-db.driverClassName=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.liquibase.enabled=false 

# ??????????? SQL
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.hibernate.SQL=DEBUG

debug=true
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.liquibase=DEBUG

# ========================
# Caching
# ========================
spring.cache.type=caffeine

# ========================
# H2 console (for debugging)
# ========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# Logging
# ========================
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.liquibase=INFO

# Enable debug mode to see detailed startup info
debug=true