databaseChangeLog:
  - changeSet:
      id: 001-create-dynamic-rule-table
      author: team
      changes:
        - createTable:
            tableName: dynamic_rule
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: product_text
                  type: TEXT
                  constraints:
                    nullable: false
        - createTable:
            tableName: rule_query
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: rule_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rule_query_rule
                    references: dynamic_rule(id)
              - column:
                  name: query_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: arguments
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: negate
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false